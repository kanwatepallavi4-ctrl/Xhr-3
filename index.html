<!DOCTYPE html>
<html>
	<head>
		<title>xhr-2</title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
       <link rel="stylesheet" href="./assests/css/style.css">
	</head>
    <body>
        <div class="container mt-4">
            <div class="row">
                <div class="col-md-6 mb-5 offset-md-3">
                    <div class="card">
                        <div class="card-body">
                            <form id="postform">
                                <div class="from-group">
                                    <label for="title" class="font-weight-bold">Title*</label>
                                    <input required type="text" class="form-control" id="title">

                                    <label for="body" class="font-weight-bold">Body*</label>
                                    <textarea required name="body" rows="4" class="form-control" id="body"></textarea>
                                </div>
                                <div class="form-group">
                                    <label for="UserId" class="font-weight-bold">UserId*</label>
                                    <select name="" class="form-control" id="userId">
                                        <option value="1">1</option>
                                        <option value="2">2</option>
                                        <option value="3">3</option>
                                        <option value="4">4</option>
                                        <option value="5">5</option>
                                        <option value="6">6</option>
                                        <option value="7">7</option>
                                        <option value="8">8</option>
                                        <option value="9">9</option>
                                        <option value="10">10</option>
                                    </select>
                                </div>
                                <button class="btn btn-outline-primary btn-block" id="addpost">addpost</button>
                                <button type="button" class="btn btn-outline-primary btn-block d-none" id="updateBtn">updateBtn</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="container-fluid">
            <div class="row" id="postcontainer">
                
            </div>
        </div>

        <div class="spinner d-none" id="spinner">
            <div class="spinner-border text-primary" role="status">
                <span class="sr-only">Loading...</span>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="./assests/js/app.js"></script>
    </body>
</html>
